; Dev PHP overrides for Beam — large file uploads.
; PHP ships with tiny defaults (upload_max_filesize=2M, post_max_size=8M) which
; cause HTTP 413 "Payload Too Large" long before our 200 MB/file app limit.
;
; Use it with the built-in dev server:
;     php -c php-dev.ini artisan serve
; (the -c flag points PHP at this file instead of the system php.ini)
;
; For production (nginx + PHP-FPM) set the same values in the real php.ini AND
; add `client_max_body_size 2048M;` to the nginx server block.

upload_max_filesize = 2048M     ; max size of a single uploaded file
post_max_size       = 2100M     ; must be >= upload_max_filesize (a bit higher for multipart overhead)
max_file_uploads    = 200       ; allow many files per transfer
memory_limit        = 512M
max_execution_time  = 600       ; seconds — big uploads take time
max_input_time      = 600
