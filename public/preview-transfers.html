<!DOCTYPE html>
<!-- PREVIEW ONLY: mirror of pages/transfers content region. -->
<html lang="en">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><meta name="api-base" content="/api">
<title>Transfers — Beam</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Hanken+Grotesk:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="assets/js/tailwind.config.js"></script>
<link rel="stylesheet" href="assets/css/app.css">
<style>.ico{stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}</style>
</head>
<body class="bg-ink-50 text-ink-700 antialiased">
<div class="h-screen overflow-auto scroll-thin">
<div class="fade-in max-w-[1100px] mx-auto p-7">
  <div class="grid grid-cols-3 gap-4 mb-6">
    <div class="bg-white border border-ink-100 rounded-xl px-5 py-[18px]"><div class="font-mono text-[11px] tracking-[.1em] uppercase text-ink-400">Active transfers</div><div class="font-display font-bold text-3xl text-ink-900 tracking-tight mt-1.5">14</div></div>
    <div class="bg-white border border-ink-100 rounded-xl px-5 py-[18px]"><div class="font-mono text-[11px] tracking-[.1em] uppercase text-ink-400">Downloads this week</div><div class="font-display font-bold text-3xl text-ink-900 tracking-tight mt-1.5 flex items-baseline gap-2">238<small class="text-[13px] font-semibold text-success-700 font-body">▲ 18%</small></div></div>
    <div class="bg-white border border-ink-100 rounded-xl px-5 py-[18px]"><div class="font-mono text-[11px] tracking-[.1em] uppercase text-ink-400">Data sent</div><div class="font-display font-bold text-3xl text-ink-900 tracking-tight mt-1.5 flex items-baseline gap-2">92<small class="text-[13px] text-ink-400 font-body">GB</small></div></div>
  </div>
  <div class="bg-ink-900 rounded-2xl px-7 py-[26px] flex items-center gap-5 mb-6 overflow-hidden relative">
    <div class="absolute -right-5 -top-5 w-40 h-40 rounded-full bg-brand-500 opacity-25 blur-lg"></div>
    <div class="flex-1 relative"><h3 class="text-white font-display font-bold text-[22px] tracking-tight">Send something big.</h3><p class="text-ink-300 text-sm mt-1">Drag in up to 200 GB. Encrypted end-to-end, gone when you say so.</p></div>
    <a href="#" class="flex items-center gap-2 h-[52px] px-7 rounded-full bg-spark-500 hover:bg-spark-600 text-ink-900 font-semibold text-[17px] whitespace-nowrap transition-colors relative"><svg class="w-[18px] h-[18px] ico" viewBox="0 0 24 24"><path d="M12 19V6"/><path d="M7 11l5-5 5 5"/><path d="M5 21h14"/></svg>New transfer</a>
  </div>
  <div class="flex items-center justify-between mb-3.5">
    <h3 class="font-display font-bold text-lg text-ink-900">Recent transfers</h3>
    <button type="button" class="flex items-center gap-2 h-[34px] px-3.5 rounded-full text-ink-700 hover:bg-ink-100 text-[13px] font-semibold whitespace-nowrap transition-colors">View all <svg class="w-[15px] h-[15px] ico" viewBox="0 0 24 24"><path d="M9 6l6 6-6 6"/></svg></button>
  </div>
  <div id="txGrid" class="grid grid-cols-3 gap-4"></div>
</div>
</div>
<div id="toasts" class="fixed bottom-24 left-1/2 -translate-x-1/2 z-[60] flex flex-col gap-2 items-center pointer-events-none"></div>
<script>
  // expand the 6 demo cards client-side for the preview (Blade @foreach does this server-side)
  const TX = [
    ['Q3 Brand Refresh','3 files · 1.6 GB',12,'in 6 days','success','Active'],
    ['Podcast masters','1 file · 740 MB',3,'in 2 days','warning','Expiring'],
    ['Wedding photos','214 files · 8.2 GB',41,'in 12 days','success','Active'],
    ['Investor deck v4','2 files · 36 MB',7,'in 4 days','brand','Encrypted'],
    ['Product photography','58 files · 3.1 GB',0,'in 9 days','neutral','No views'],
    ['Contract — signed','1 file · 1.2 MB',2,'Expired','danger','Expired'],
  ];
  const B={success:'bg-success-50 text-success-700',warning:'bg-warning-50 text-warning-700',danger:'bg-danger-50 text-danger-700',brand:'bg-brand-50 text-brand-700',neutral:'bg-ink-100 text-ink-600'};
  const dl2='<svg class="w-6 h-6 ico" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>';
  const dl='<svg class="w-[15px] h-[15px] ico text-ink-400" viewBox="0 0 24 24"><path d="M12 3v12"/><path d="M7 10l5 5 5-5"/><path d="M5 21h14"/></svg>';
  const clk='<svg class="w-[15px] h-[15px] ico text-ink-400" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>';
  document.getElementById('txGrid').innerHTML = TX.map(([title,meta,d,exp,tone,st])=>`
    <div class="bg-white border border-ink-100 rounded-xl p-[18px] shadow-sm hover:shadow-md hover:-translate-y-0.5 transition cursor-pointer flex flex-col gap-3.5">
      <div class="flex items-start gap-3">
        <div class="w-12 h-12 rounded-xl bg-brand-50 flex items-center justify-center flex-none text-brand-500">${dl2}</div>
        <div class="flex-1 min-w-0"><div class="font-display font-bold text-[17px] text-ink-900 truncate tracking-tight">${title}</div><div class="font-mono text-xs text-ink-400 mt-0.5">${meta}</div></div>
        <span class="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-full text-xs font-semibold whitespace-nowrap ${B[tone]}">${tone!=='neutral'?'<span class="w-1.5 h-1.5 rounded-full bg-current"></span>':''}${st}</span>
      </div>
      <div class="flex items-center justify-between gap-2.5 pt-3 border-t border-ink-100">
        <span class="flex items-center gap-1.5 text-[13px] text-ink-700">${dl}<b class="font-mono text-ink-900">${d}</b> downloads</span>
        <span class="flex items-center gap-1.5 text-[13px] text-ink-700">${clk}${exp}</span>
      </div>
    </div>`).join('');
</script>
</body>
</html>
